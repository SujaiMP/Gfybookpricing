<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gfybook Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #050507;
    font-family: 'Sora', sans-serif;
    padding: 52px 16px 72px;
    position: relative;
    overflow-x: hidden;
  }

  /* BG ambient glow */
  body::before {
    content: '';
    position: absolute;
    top: -250px; left: 50%; transform: translateX(-50%);
    width: 900px; height: 600px;
    background: radial-gradient(ellipse, rgba(251,191,36,0.03) 0%, transparent 65%);
    pointer-events: none;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes revealDown {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    text-align: center;
    max-width: 580px;
    margin: 0 auto 48px;
    animation: slideUp 0.5s ease both;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 24px;
    background: rgba(251,191,36,0.05);
    border: 1px solid rgba(251,191,36,0.1);
  }
  .header-badge span {
    font-size: 12px; font-weight: 700; color: #fbbf24; letter-spacing: 0.5px;
  }
  .header h1 {
    font-size: 42px; font-weight: 800; color: #f0f4f8;
    letter-spacing: -1.8px; line-height: 1.1; margin-bottom: 14px;
  }
  .header h1 em { font-style: normal; color: #fbbf24; }
  .header p {
    font-size: 15px; color: rgba(255,255,255,0.3); line-height: 1.6;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 14px;
    max-width: 1360px;
    margin: 0 auto;
    align-items: start;
  }

  .card {
    border-radius: 22px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: slideUp 0.55s cubic-bezier(0.23,1,0.32,1) forwards;
  }
  .card:nth-child(1) { animation-delay: 0s; }
  .card:nth-child(2) { animation-delay: 0.07s; }
  .card:nth-child(3) { animation-delay: 0.14s; }
  .card:nth-child(4) { animation-delay: 0.21s; }
  .card:nth-child(5) { animation-delay: 0.28s; }

  .card-accent-bar {
    height: 2px;
  }
  .card-glow {
    position: absolute; top: -60px; right: -60px; width: 180px; height: 180px;
    border-radius: 50%; pointer-events: none;
  }
  .card-body {
    padding: 26px 22px 22px;
    position: relative; z-index: 1;
    display: flex; flex-direction: column; flex: 1;
  }

  .tag {
    align-self: flex-start; margin-bottom: 16px;
    padding: 4px 12px; border-radius: 8px;
    font-size: 9.5px; font-weight: 700; letter-spacing: 2px;
  }

  .plan-name {
    font-size: 24px; font-weight: 800; color: #eef2f7;
    letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 5px;
  }
  .plan-desc {
    font-size: 12.5px; color: rgba(255,255,255,0.32);
    line-height: 1.4; margin-bottom: 20px;
  }

  .price-row {
    display: flex; align-items: baseline; gap: 3px; margin-bottom: 22px;
  }
  .price-amount {
    font-size: 44px; font-weight: 800; letter-spacing: -2px; line-height: 1;
  }
  .price-period {
    font-size: 14px; color: rgba(255,255,255,0.25); font-weight: 500;
  }

  .cta-btn {
    width: 100%; padding: 13px 0; border-radius: 12px; cursor: pointer;
    font-family: 'Sora', sans-serif; font-size: 13.5px; font-weight: 700;
    letter-spacing: 0.2px; margin-bottom: 24px; transition: all 0.2s ease;
  }
  .cta-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .cta-outline {
    background: rgba(255,255,255,0.02); color: inherit;
  }
  .cta-filled {
    border: none; color: #080808;
  }

  .divider {
    height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 20px;
  }

  .section-label {
    display: flex; align-items: center; gap: 6px; margin-bottom: 12px;
  }
  .section-dot {
    width: 3px; height: 12px; border-radius: 2px; opacity: 0.5;
  }
  .section-label span {
    font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase;
  }

  .limit-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.035);
  }
  .limit-row:last-child { border-bottom: none; }
  .limit-key { font-size: 12.5px; color: rgba(255,255,255,0.45); }
  .limit-val {
    font-size: 13px; font-weight: 700; color: #d4dae4;
    font-variant-numeric: tabular-nums;
  }
  .limit-val.highlight { /* set per-card via inline */ }

  .feat-row {
    display: flex; align-items: center; gap: 10px; padding: 4.5px 0;
  }
  .feat-row span { font-size: 12.5px; color: rgba(255,255,255,0.55); line-height: 1.35; }

  .not-avail-row {
    display: flex; align-items: center; gap: 10px; padding: 4px 0;
  }
  .not-avail-row span {
    font-size: 12px; color: rgba(255,255,255,0.18);
    text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.08);
  }

  .toggle-btn {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
    border-radius: 8px; cursor: pointer; padding: 7px 12px; width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 4px; transition: background 0.2s;
  }
  .toggle-btn:hover { background: rgba(255,255,255,0.04); }
  .toggle-btn span {
    font-family: 'Sora', sans-serif; font-size: 11px;
    color: rgba(255,255,255,0.2); font-weight: 600;
  }
  .toggle-btn svg {
    transition: transform 0.25s ease;
  }
  .toggle-btn.open svg { transform: rotate(180deg); }

  .not-avail-list {
    padding-top: 8px;
    animation: revealDown 0.2s ease;
  }
  .not-avail-list.hidden { display: none; }

  .footer {
    text-align: center; max-width: 440px; margin: 44px auto 0;
    font-size: 11.5px; color: rgba(255,255,255,0.15); line-height: 1.6;
    animation: slideUp 0.5s ease 0.4s both;
  }

  /* Icons as inline SVG backgrounds */
  .icon-tick, .icon-cross { width: 16px; height: 16px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-badge">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="2" width="12" height="12" rx="3" stroke="#fbbf24" stroke-width="1.2"/>
      <path d="M5 8h6M8 5v6" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span>GFYBOOK PRICING</span>
  </div>
  <h1>Simple plans, <em>real value</em></h1>
  <p>From free invoicing to full-scale business automation. Every feature listed, nothing hidden.</p>
</div>

<!-- Cards Grid -->
<div class="grid" id="cards-grid"></div>

<!-- Footer -->
<p class="footer">All prices in INR. Add-on packs available for WhatsApp messages &amp; invoices.</p>

<script>
const plans = [
  {
    name: "Free", price: "₹0", period: "/mo", tag: null,
    gradient: "linear-gradient(145deg, #111318 0%, #0c0e14 100%)",
    accent: "#737b8e", border: "1px solid rgba(255,255,255,0.05)",
    description: "Get started with the basics",
    limits: [["Invoices","15"],["Contacts","50"],["Products","50"],["Templates","2"],["WhatsApp","5"]],
    included: ["Gfybook watermark on invoices","Basic invoice creation","Single user access"],
    notIncluded: ["Payment links","Analytics","Bulk invoicing","CSV import","Auto reminders","API access","Team management","Scheduling","Reports"],
    cta: "Start Free", ctaFilled: false,
  },
  {
    name: "Starter", price: "₹499", period: "/mo", tag: null,
    gradient: "linear-gradient(145deg, #0b1a12 0%, #091510 100%)",
    accent: "#34d399", border: "1px solid rgba(255,255,255,0.05)",
    description: "For freelancers & solopreneurs",
    limits: [["Invoices","1,200"],["Contacts","2,000"],["Products","1,000"],["Templates","8"],["WhatsApp","400"]],
    included: ["Payment links","Basic analytics","No watermark branding","Bulk invoicing (400)","CSV import","Email support"],
    notIncluded: ["Auto reminders","Reports","API access","Team management","Scheduling"],
    cta: "Get Starter", ctaFilled: false,
  },
  {
    name: "Growth", price: "₹999", period: "/mo", tag: "MOST POPULAR",
    gradient: "linear-gradient(145deg, #1c1408 0%, #171005 100%)",
    accent: "#fbbf24", border: "1.5px solid rgba(251,191,36,0.37)",
    description: "Best value for growing teams",
    limits: [["Invoices","3,000"],["Contacts","4,000"],["Products","2,000"],["Templates","12"],["WhatsApp","900"]],
    included: ["Payment links","Basic analytics","Bulk invoicing (limited)","No watermark branding","CSV import","Priority email support","Auto reminders (limited)"],
    notIncluded: ["API access","Team management","Scheduling"],
    cta: "Get Growth", ctaFilled: true,
  },
  {
    name: "Pro", price: "₹1,499", period: "/mo", tag: null,
    gradient: "linear-gradient(145deg, #0b1220 0%, #080e1a 100%)",
    accent: "#60a5fa", border: "1px solid rgba(255,255,255,0.05)",
    description: "Advanced automation & bulk tools",
    limits: [["Invoices","5,000"],["Contacts","5,000"],["Products","2,500"],["Templates","20"],["WhatsApp","1,500"]],
    included: ["Payment links","Advanced analytics","Bulk invoicing","CSV import","Auto reminders","Reports","No watermark branding","Priority support"],
    notIncluded: ["API access","Team management","Scheduling"],
    cta: "Get Pro", ctaFilled: false,
  },
  {
    name: "Business", price: "₹2,499", period: "/mo", tag: "ALL ACCESS",
    gradient: "linear-gradient(145deg, #150b22 0%, #100820 100%)",
    accent: "#c084fc", border: "1px solid rgba(255,255,255,0.05)",
    description: "For teams & agencies at scale",
    limits: [["Invoices","10,000"],["Contacts","10,000"],["Products","5,000"],["Templates","Unlimited"],["WhatsApp","2,800"]],
    included: ["Payment links","Advanced analytics","Bulk invoicing","CSV import","Auto reminders","Reports","API access","Team management","Scheduling","No watermark branding","Dedicated support"],
    notIncluded: [],
    cta: "Get Business", ctaFilled: false,
  },
];

function tickSVG(color) {
  return `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
    <rect x="0.5" y="0.5" width="15" height="15" rx="4" fill="${color}10" stroke="${color}30"/>
    <path d="M4.8 8.2L6.8 10.2L11.2 5.8" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function crossSVG() {
  return `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
    <rect x="0.5" y="0.5" width="15" height="15" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
    <path d="M5.8 5.8L10.2 10.2M10.2 5.8L5.8 10.2" stroke="rgba(255,255,255,0.15)" stroke-width="1.3" stroke-linecap="round"/>
  </svg>`;
}

function chevronSVG() {
  return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <path d="M3 4.5L6 7.5L9 4.5" stroke="rgba(255,255,255,0.2)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

const grid = document.getElementById('cards-grid');

plans.forEach((plan, idx) => {
  const isPop = plan.tag === 'MOST POPULAR';
  const id = `card-${idx}`;

  let tagHTML = '';
  if (plan.tag) {
    tagHTML = `<div class="tag" style="background:${plan.accent}12;border:1px solid ${plan.accent}25;color:${plan.accent}">${plan.tag}</div>`;
  }

  let glowHTML = '';
  if (isPop) {
    glowHTML = `<div class="card-glow" style="background:radial-gradient(circle,${plan.accent}08 0%,transparent 70%)"></div>`;
  }

  const limitsHTML = plan.limits.map(([k,v]) => {
    const valColor = v === 'Unlimited' ? plan.accent : '#d4dae4';
    return `<div class="limit-row">
      <span class="limit-key">${k}</span>
      <span class="limit-val" style="color:${valColor}">${v}</span>
    </div>`;
  }).join('');

  const includedHTML = plan.included.map(f =>
    `<div class="feat-row">${tickSVG(plan.accent)}<span>${f}</span></div>`
  ).join('');

  let notIncludedHTML = '';
  if (plan.notIncluded.length > 0) {
    const items = plan.notIncluded.map(f =>
      `<div class="not-avail-row">${crossSVG()}<span>${f}</span></div>`
    ).join('');
    notIncludedHTML = `
      <div style="margin-top:4px">
        <button class="toggle-btn" onclick="toggleNA('${id}', this)">
          <span>Not available in this plan (${plan.notIncluded.length})</span>
          ${chevronSVG()}
        </button>
        <div class="not-avail-list hidden" id="${id}-na">${items}</div>
      </div>`;
  }

  const btnBorder = plan.ctaFilled ? 'border:none' : `border:1.5px solid ${plan.accent}40`;
  const btnBg = plan.ctaFilled ? `background:linear-gradient(135deg,${plan.accent},${plan.accent}cc)` : 'background:rgba(255,255,255,0.02)';
  const btnColor = plan.ctaFilled ? 'color:#080808' : `color:${plan.accent}`;

  const card = document.createElement('div');
  card.className = 'card';
  card.style.background = plan.gradient;
  card.style.border = plan.border;
  card.id = id;

  card.innerHTML = `
    <div class="card-accent-bar" style="background:linear-gradient(90deg,transparent 10%,${plan.accent}50 50%,transparent 90%)"></div>
    ${glowHTML}
    <div class="card-body">
      ${tagHTML}
      <div style="margin-bottom:20px">
        <div class="plan-name">${plan.name}</div>
        <div class="plan-desc">${plan.description}</div>
      </div>
      <div class="price-row">
        <span class="price-amount" style="color:${plan.accent}">${plan.price}</span>
        <span class="price-period">${plan.period}</span>
      </div>
      <button class="cta-btn ${plan.ctaFilled ? 'cta-filled' : 'cta-outline'}" style="${btnBorder};${btnBg};${btnColor}">${plan.cta}</button>
      <div class="divider"></div>

      <div style="margin-bottom:20px">
        <div class="section-label">
          <div class="section-dot" style="background:${plan.accent}"></div>
          <span style="color:rgba(255,255,255,0.25)">Limits</span>
        </div>
        ${limitsHTML}
      </div>

      <div style="margin-bottom:${plan.notIncluded.length > 0 ? '14px' : '0'}">
        <div class="section-label">
          <div class="section-dot" style="background:${plan.accent}"></div>
          <span style="color:${plan.accent};opacity:0.6">What's included</span>
        </div>
        ${includedHTML}
      </div>

      ${notIncludedHTML}
    </div>
  `;

  grid.appendChild(card);
});

function toggleNA(cardId, btn) {
  const list = document.getElementById(cardId + '-na');
  const isHidden = list.classList.contains('hidden');
  list.classList.toggle('hidden');
  btn.classList.toggle('open', isHidden);
}
</script>
</body>
</html>
